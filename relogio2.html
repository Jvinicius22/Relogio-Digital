<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relogio Digiral</title>
</head>

<style>
    
    *{
        margin: 0;
        padding: 0;
    }

    body{
        background: linear-gradient(130deg, lightblue, black);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .relogio {
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: 200px;
    width: 550;
    background: transparent;
    border-radius: 3px;
    box-shadow: 0px 8px 10px rgba(0, 0, 0, 0.5);
    gap: 10px;
}

.relogio span.tempo{
    font-size: 20px;
}

.relogio span{
    font-weight: bold;
    font-size: 60px;
}

.relogio div{
   box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5);
   background-color: black;
   color: lightblue;
   border-radius: 10px;
   letter-spacing: 2px;
   align-items:center;
   flex-direction: column;
   justify-content: space-around;
   display: flex;
   margin: 10px;
   height: 170px;
   width: 200px;
}

.calendario{
    background: rgba(0, 0, 0, 0.7);
    border-radius: 20px;
    padding: 30px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.data-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    }

.data-completa{
    font-size: 2.5rem;
    font-weight: bold;
    text-align: center;
    color: lightblue;
}

 .detalhes-data {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
        width: 100%;
    }
 
 .detalhes-data div{
    background:rgba(255, 255, 255, 0.1);
    color: white;
    border-radius: 15px;
    padding: 15px;
    min-width: 100px;
 }

 .detalhes-data span:first-child{
    font-size: 1rem;
    color: #cbd5e1;
   text-transform: uppercase;
 }

 .detalhes-data span:last-child{
  font-size: 1.8rem;
  font-weight: bold;
  color: lightblue;
 }

</style>
<body>
    <div class="relogio">

        <div>
            <span id="horas">00</span>
            <span class="tempo">Horas</span>
        </div>

        <div>
            <span id="minutos">00</span>
            <span class="tempo">Minutos</span>
        </div>

        <div>
            <span id="segundos">00</span>
            <span class="tempo">Segundos</span>
        </div>
    </div>

    <div class="calendario">
        <div class="data-container">
            <div id="data-completa" class="data-completa">Carregando...</div>
            <div class="detalhes-data">
                <div>
                    <span>Dia da Semana</span>
                    <span id="dia-semana">-</span>
                </div>

                <div>
                    <span>Dia do mês</span>
                    <span id="dia-mes">-</span>
                </div>

                <div>
                        <span>Mês</span>
                        <span id="mes">-</span>
                </div>

                <div>
                    <span>Ano</span>
                    <span id="ano">-</span>
                </div>

            </div> <!--detalhes data-->

        </div> <!--div data container-->

    </div> <!--div calendario-->


    <!-----JavaScript----->
    <script>
     //Elementos do relogio
    const horas = document.getElementById('horas');
    const minutos = document.getElementById('minutos');
    const segundos = document.getElementById('segundos');

    const relogio = setInterval(function time(){
        let datetoday = new Date();
        let hr = datetoday.getHours();
        let min = datetoday.getMinutes();
        let s = datetoday.getSeconds().toString().padStart(2,'0'); /* Pra colocar o zero na frente 
                                                                         quando estiver abaixo de 10*/
        // OUTRA FORMA DE COLOCAR O ZERO NA FRENTE, COLOCA ISSO JUNTO COM O LET ACIMA 
    if (hr < 10) hr = '0' + hr;

    if (min < 10) min = '0' + min;    
    
        horas.textContent = hr;
        minutos.textContent = min;
        segundos.textContent = s;                                                                    
    })

    // Elementos do calendário
        const dataCompleta = document.getElementById('data-completa');
        const diaSemana = document.getElementById('dia-semana');
        const diaMes = document.getElementById('dia-mes');
        const mes = document.getElementById('mes');
        const ano = document.getElementById('ano');
        
        // Arrays com nomes dos dias e meses
        const diasDaSemana = [
            "Domingo", "Segunda-feira", "Terça-feira", 
            "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"
        ];
        
        const mesesDoAno = [
            "Janeiro", "Fevereiro", "Março", "Abril", 
            "Maio", "Junho", "Julho", "Agosto", 
            "Setembro", "Outubro", "Novembro", "Dezembro"
        ];
        
        // Função para formatar números com zero à esquerda
        function formatarNumero(num) {
            return num < 10 ? '0' + num : num;
        }
        
        // Função para atualizar relógio e calendário
        function atualizarTempo() {
            const agora = new Date();
            
            // Atualizar relógio
            horas.textContent = formatarNumero(agora.getHours());
            minutos.textContent = formatarNumero(agora.getMinutes());
            segundos.textContent = formatarNumero(agora.getSeconds());
            
            // Atualizar calendário
            const diaSemanaNum = agora.getDay(); // 0 = Domingo, 1 = Segunda, etc.
            const diaMesNum = agora.getDate();
            const mesNum = agora.getMonth(); // 0 = Janeiro, 1 = Fevereiro, etc.
            const anoNum = agora.getFullYear();
            
            // Formatar a data completa
            const dataFormatada = `${diasDaSemana[diaSemanaNum]}, ${diaMesNum} de ${mesesDoAno[mesNum]} de ${anoNum}`;
            
            // Atualizar elementos do DOM
            dataCompleta.textContent = dataFormatada;
            diaSemana.textContent = diasDaSemana[diaSemanaNum].substring(0, 3); // Abreviado
            diaMes.textContent = formatarNumero(diaMesNum);
            mes.textContent = mesesDoAno[mesNum].substring(0, 3); // Abreviado
            ano.textContent = anoNum;
        }
        
        // Atualizar imediatamente e depois a cada segundo
        atualizarTempo();
        setInterval(atualizarTempo, 1000);

    
   
    </script>
    
</body>
</html>
